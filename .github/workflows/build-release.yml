name: Build & Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $upstream = ""
          try {
            $r = gh release list --repo OpenSteam001/OpenSteamTool --limit 1 --json tagName --jq '.[0].tagName' 2>&1
            if ($LASTEXITCODE -eq 0 -and $r) { $upstream = $r.Trim() }
          } catch {}
          $local = ""
          try {
            $r = gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName' 2>&1
            if ($LASTEXITCODE -eq 0 -and $r) { $local = $r.Trim() }
          } catch {}
          Write-Host "Upstream: $upstream, Local: $local"
          if ($upstream -and $upstream -ne $local) {
            echo "tag=$upstream" >> $env:GITHUB_OUTPUT
            echo "create=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=" >> $env:GITHUB_OUTPUT
            echo "create=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - uses: ilammy/msvc-dev-cmd@v1
        if: steps.tag.outputs.create == 'true'

      - name: Install Ninja
        if: steps.tag.outputs.create == 'true'
        run: choco install ninja -y
        shell: pwsh

      - name: Configure
        if: steps.tag.outputs.create == 'true'
        run: cmake -S src -B build -G "Ninja Multi-Config"

      - name: Build Release
        if: steps.tag.outputs.create == 'true'
        run: cmake --build build --config Release

      - name: Build Debug
        if: steps.tag.outputs.create == 'true'
        run: cmake --build build --config Debug

      - name: Package
        if: steps.tag.outputs.create == 'true'
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "build/Release/dwmapi.dll","build/Release/xinput1_4.dll","build/Release/OpenSteamTool.dll" -DestinationPath "release/OpenSteamTool-${tag}-Release.zip" -Force
          $dbg = @("build/Debug/dwmapi.dll","build/Debug/xinput1_4.dll","build/Debug/OpenSteamTool.dll")
          if (Test-Path "build/Debug/opensteamtool.log") { $dbg += "build/Debug/opensteamtool.log" }
          Compress-Archive -Path $dbg -DestinationPath "release/OpenSteamTool-${tag}-Debug.zip" -Force
          Get-ChildItem release/
        shell: pwsh

      - name: Create Release
        if: steps.tag.outputs.create == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          gh release create "$tag" --repo "${{ github.repository }}" --title "$tag" --generate-notes release/*.zip
          Write-Host "Release $tag created"
        shell: pwsh
