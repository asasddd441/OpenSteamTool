name: Build & Release (同步上游版本号)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: 拉取自己仓库代码
        uses: actions/checkout@v4

      - name: 添加上游仓库（原仓库）
        run: |
          # 把下面这行的地址，替换成你真实的原仓库地址
          git remote add upstream https://github.com/OpenSteam001/OpenSteamTool.git
          git fetch upstream --tags

      - name: 获取上游最新版本号（vX.Y.Z）
        id: get_latest_tag
        run: |
          $latestTag = git ls-remote --tags upstream `
            | Select-String 'refs/tags/(v[0-9]+\.[0-9]+\.[0-9]+)$' `
            | ForEach-Object { $_.Line -replace '.*refs/tags/','' } `
            | Sort-Object { [version]($_ -replace '^v','') } -Descending `
            | Select-Object -First 1
          if (-not $latestTag) { $latestTag = "v0.0.0" }
          echo "latest_tag=$latestTag" >> $env:GITHUB_OUTPUT

      - name: 修复 structs.h 编译错误
        run: |
          $structFile = ".\SRC\Steam\structs.h"
          $content = Get-Content $structFile -Raw
          if (-not $content.Contains("#include <cstring>")) {
              $content = "#include <cstring>`n" + $content
              Set-Content $structFile $content
          }

      - name: 运行原项目构建脚本
        run: |
          .\build.bat

      - name: 打包文件
        run: |
          mkdir release -Force
          Compress-Archive -Path .\SRC\* -DestinationPath .\release\OpenSteamTool.zip -Force

      - name: 发布到 GitHub Release（用上游版本号）
        uses: softprops/action-gh-release@v2
        with:
          files: release/OpenSteamTool.zip
          generate_release_notes: true
          tag_name: ${{ steps.get_latest_tag.outputs.latest_tag }}
          name: "OpenSteamTool ${{ steps.get_latest_tag.outputs.latest_tag }} (同步上游)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
