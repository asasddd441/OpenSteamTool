name: Build & Release OpenSteamTool

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4

      # 👇 新增这一步，修复编译错误
      - name: 修复 structs.h 编译错误
        run: |
          $structFile = ".\SRC\Steam\structs.h"
          $content = Get-Content $structFile -Raw
          if (-not $content.Contains("#include <cstring>")) {
              $content = "#include <cstring>`n" + $content
              Set-Content $structFile $content
          }

      - name: 运行原项目构建脚本
        run: |
          .\build.bat

      - name: 打包文件
        run: |
          mkdir release -Force
          Compress-Archive -Path .\SRC\* -DestinationPath .\release\OpenSteamTool.zip -Force

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/OpenSteamTool.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
