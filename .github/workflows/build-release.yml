name: Build & Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Get upstream latest tag
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = gh release view --repo OpenSteam001/OpenSteamTool --json tagName -q tagName 2>$null
          if ($tag) {
            echo "tag=$tag" >> $env:GITHUB_OUTPUT
            Write-Host "Upstream latest: $tag"
          } else {
            echo "tag=" >> $env:GITHUB_OUTPUT
            Write-Host "No upstream tag found"
          }
        shell: pwsh

      - name: Check if release exists on fork
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.upstream.outputs.tag }}"
          if (-not $tag) {
            echo "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "No tag, skipping"
            exit 0
          }
          $existing = gh release view "$tag" --repo "${{ github.repository }}" 2>$null
          if ($existing) {
            echo "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag already exists"
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
            Write-Host "Will create release $tag"
          }
        shell: pwsh

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'
        with:
          repository: OpenSteam001/OpenSteamTool
          ref: ${{ steps.upstream.outputs.tag }}

      - uses: ilammy/msvc-dev-cmd@v1
        if: steps.check.outputs.skip == 'false'

      - name: Install Ninja
        if: steps.check.outputs.skip == 'false'
        run: choco install ninja -y
        shell: pwsh

      - name: Configure
        if: steps.check.outputs.skip == 'false'
        run: cmake -S src -B build -G "Ninja Multi-Config"

      - name: Build Release
        if: steps.check.outputs.skip == 'false'
        run: cmake --build build --config Release

      - name: Build Debug
        if: steps.check.outputs.skip == 'false'
        run: cmake --build build --config Debug

      - name: Package
        if: steps.check.outputs.skip == 'false'
        run: |
          $tag = "${{ steps.upstream.outputs.tag }}"
          New-Item -ItemType Directory -Force -Path release | Out-Null

          Compress-Archive -Path "build/Release/dwmapi.dll","build/Release/xinput1_4.dll","build/Release/OpenSteamTool.dll" -DestinationPath "release/OpenSteamTool-${tag}-Release.zip" -Force
          Write-Host "Created Release zip"

          $debugFiles = @("build/Debug/dwmapi.dll","build/Debug/xinput1_4.dll","build/Debug/OpenSteamTool.dll")
          if (Test-Path "build/Debug/opensteamtool.log") { $debugFiles += "build/Debug/opensteamtool.log" }
          Compress-Archive -Path $debugFiles -DestinationPath "release/OpenSteamTool-${tag}-Debug.zip" -Force
          Write-Host "Created Debug zip"

          Get-ChildItem release/
        shell: pwsh

      - name: Create Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.upstream.outputs.tag }}"
          gh release create "$tag" `
            --repo "${{ github.repository }}" `
            --title "$tag" `
            --generate-notes `
            release/*.zip
        shell: pwsh
