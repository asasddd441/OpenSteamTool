name: Sync Upstream
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: git remote add upstream https://github.com/OpenSteam001/OpenSteamTool.git

      - name: Fetch and merge
        run: |
          git fetch upstream
          git merge upstream/main --no-edit || true

      - name: Push to fork
        run: git push origin main
